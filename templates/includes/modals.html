<!-- نوافذ الصفحات المنبثقة -->
<div class="page-modal" id="page-modal">
    <div class="page-modal-content">
        <div class="page-modal-header">
            <h3 class="page-modal-title" id="page-modal-title">الشحن الدولي</h3>
            <button class="page-modal-close" id="close-page-modal">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="page-modal-body" id="page-modal-body">
            <!-- محتوى الصفحة سيتم تحميله هنا -->
        </div>
        <div class="page-modal-footer">
            <p>آخر تحديث: <span id="page-last-updated">2024-01-01</span></p>
        </div>
    </div>
</div>

<!-- Search Overlay -->
<div class="search-overlay" id="search-overlay">
    <div class="search-header">
        <h2 style="color: var(--accent);">ابحث عن المنتجات</h2>
        <div class="modal-close" id="close-search">
            <i class="fas fa-times"></i>
        </div>
    </div>
    <div class="search-container">
        <div class="search-input-group">
            <input type="text" class="search-input" id="search-input" placeholder="ابحث عن المنتجات، الماركات، الفئات..." autocomplete="off">
            <button class="search-btn" id="search-submit">
                <i class="fas fa-search"></i>
            </button>
        </div>
        <div class="search-results" id="search-results">
            <!-- نتائج البحث ستظهر هنا -->
        </div>
    </div>
</div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
        <h3 class="cart-title">سلة التسوق</h3>
        <div class="modal-close" id="close-cart">
            <i class="fas fa-times"></i>
        </div>
    </div>
    <div class="cart-items" id="cart-items">
        <!-- Cart items will be inserted here -->
    </div>
    <div class="cart-footer">
        <div class="cart-summary" id="cart-summary">
            <!-- Summary will be inserted here -->
        </div>
        <button class="btn btn-primary" style="width: 100%;" id="checkout-btn">إتمام الشراء</button>
    </div>
</div>
